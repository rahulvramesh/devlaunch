appId: com.devlaunch.app
productName: DevLaunch
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - node_modules/node-pty/**
win:
  executableName: devlaunch
  target:
    - target: nsis
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: DevLaunch
  uninstallDisplayName: DevLaunch
  createDesktopShortcut: always
mac:
  target:
    - target: dmg
      arch: [universal]
  identity: null
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
npmRebuild: false
